# PostgreSQL pour le backend Symfony (dev local). Démarrage : docker compose up -d
services:
  db:
    image: postgres:16-alpine
    container_name: greenit-finops-postgres
    environment:
      POSTGRES_USER: greenit
      POSTGRES_PASSWORD: greenit
      POSTGRES_DB: greenit
    ports:
      - '5432:5432'
    volumes:
      - greenit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U greenit -d greenit']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  greenit_pgdata:
